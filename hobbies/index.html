<!DOCTYPE html>
<html>
  <head>
    <title>Brendan Lewis's Portfolio | Hobbies</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/assets/main.css"/>
    <link rel="icon" type="image/x-icon" href="https://craftablescience.github.io/favicon.ico"/>
  </head>
  <body>
     <ul id="navbar">
      <li><a href="/">About</a></li>
      <li><a href="/projects">Projects</a></li>
      <li><a class="active" href="/hobbies">Hobbies</a></li>
      <li><a href="/contact">Contact Me</a></li>

    <div id="content">
      <h1 style="color: red; text-align: center;">UNDER CONSTRUCTION</h1>
      <div class="duolingo-content">
        <h1 id="streak-count"><noscript>JavaScript disabled :(</noscript></h1>
      </div>
    </div>
    <script>
      fetch('https://www.duolingo.com/api/1/users/show?username=craftablescience',
            {method: 'GET',
             mode: 'no-cors',
             credentials: 'omit',
             headers: {'Accept': 'application/json',
                       'Content-Type': 'application/json'}})
        .then(
          function(response) {
            if (response.status !== 200) {
              console.log('Looks like there was a problem. Status Code: ' +
                          response.status);
              return;
            }

            // Examine the text in the response
            response.json().then(function(data) {
              console.log(data);
            });
          }
        ).catch(function(err) {
          console.log('Fetch Error :-S', err);
        }
      );
    </script>
  </body>
